project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about.qmd
    - books.qmd
    - articles/index.qmd
    - articles/Brownian_motion/index.qmd

website:
  title: "raykil"

  navbar:
    background: "#0d0d0f"
    foreground: "#e8e6e0"
    pinned: true
    search: false
    right:
      - text: "About"
        href: about.qmd
      - text: "Articles"
        href: articles/index.qmd
      - text: "Books"
        href: books.qmd

  page-footer:
    background: "#0d0d0f"
    border: true
    left: "© 2026 Raymond Kil · Notre Dame"
    right:
      - text: "Email"
        href: "mailto:jkil@nd.edu"
      - text: "GitHub"
        href: "https://github.com/raykil"
        target: "_blank"
      - text: "LinkedIn"
        href: "https://www.linkedin.com/in/jungminkil/"
        target: "_blank"

format:
  html:
    theme:
      - darkly
      - custom.scss
    toc: true
    toc-location: left
    toc-depth: 3
    toc-title: "Contents"
    mainfont: "'IBM Plex Sans', system-ui, sans-serif"
    monofont: "'IBM Plex Mono', monospace"
    fontsize: 1rem
    linestretch: 1.75
    smooth-scroll: true
    html-math-method: mathjax
    highlight-style: github-dark
    code-block-bg: "#131316"
    code-block-border-left: "#2a2a32"
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

execute:
  freeze: auto
  cache: true
