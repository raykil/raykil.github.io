project:
  type: website
  output-dir: quarto_articles
  render:
    - articles/*/index.qmd

format:
  html:
    theme:
      - darkly
      - custom.scss
    toc: true
    toc-location: left
    toc-depth: 3
    toc-title: "Contents"
    mainfont: "'IBM Plex Sans', system-ui, sans-serif"
    monofont: "'IBM Plex Mono', monospace"
    fontsize: 1rem
    linestretch: 1.75
    smooth-scroll: true
    html-math-method: mathjax
    highlight-style: github-dark
    code-block-bg: "#131316"
    code-block-border-left: "#2a2a32"
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

execute:
  freeze: auto
  cache: true
